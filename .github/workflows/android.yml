name: Android CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          cache-read-only: false
          validate-wrappers: false

      - name: Prepare Environment & Secrets
        run: |
          # The secrets-gradle-plugin expects a .env file to exist, so we copy .env.example
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_key_for_ci_build" > .env
          fi
          
          # Decode pre-configured debug keystore so the build has consistent signatures
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      - name: Run JVM Unit Tests
        run: gradle testDebugUnitTest

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
